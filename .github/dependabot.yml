version: 2
updates:
  # Frontend dependencies with staged rollout
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Minor and patch updates for non-framework deps
      minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "react*"
          - "next*"
          - "tailwindcss*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      # Testing library updates
      testing:
        patterns:
          - "@testing-library/*"
          - "jest*"
    labels:
      - "dependencies"
      - "frontend"
    # Ignore major version bumps for frameworks - requires manual review
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  # Backend dependencies with staged rollout
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    groups:
      # Security-critical packages get separate PRs
      security:
        patterns:
          - "cryptography"
          - "pyjwt"
          - "bcrypt"
          - "passlib"
      # Database clients
      database:
        patterns:
          - "sqlalchemy*"
          - "asyncpg"
          - "psycopg*"
          - "redis"
          - "neo4j"
      # Web framework
      web:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn"
          - "pydantic*"
      # Minor and patch for everything else
      minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "cryptography"
          - "pyjwt"
          - "fastapi"
          - "sqlalchemy*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "thursday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "thursday"
    labels:
      - "dependencies"
      - "docker"
