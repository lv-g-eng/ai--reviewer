name: Build Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
      - develop

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    # Only run if CI pipeline passed or on direct push/PR
    if: |
      github.event_name == 'push' || 
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create production environment file
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_API_URL=${{ secrets.PRODUCTION_API_URL || 'https://api.example.com' }}
          NEXT_PUBLIC_ENV=production
          EOF
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
      
      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed: .next directory not found"
            exit 1
          fi
          
          if [ ! -f ".next/BUILD_ID" ]; then
            echo "❌ Build failed: BUILD_ID not found"
            exit 1
          fi
          
          BUILD_ID=$(cat .next/BUILD_ID)
          echo "✅ Build successful with ID: $BUILD_ID"
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
      
      - name: Check build size
        run: |
          echo "## 📦 Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Static Files" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/* | awk '{print "- " $2 ": " $1}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Total Build Size" >> $GITHUB_STEP_SUMMARY
          du -sh .next | awk '{print "**" $1 "**"}' >> $GITHUB_STEP_SUMMARY
      
      - name: Create build artifact
        run: |
          mkdir -p ../build-artifacts
          tar -czf ../build-artifacts/frontend-build-${{ github.sha }}.tar.gz .next public package.json package-lock.json next.config.mjs
          echo "✅ Build artifact created: frontend-build-${{ github.sha }}.tar.gz"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: build-artifacts/frontend-build-${{ github.sha }}.tar.gz
          retention-days: 30
          compression-level: 0  # Already compressed as tar.gz
      
      - name: Generate build metadata
        run: |
          cat > ../build-artifacts/build-metadata.json << EOF
          {
            "buildId": "$BUILD_ID",
            "commitSha": "${{ github.sha }}",
            "commitMessage": "${{ github.event.head_commit.message }}",
            "branch": "${{ github.ref_name }}",
            "buildTime": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "nodeVersion": "$(node --version)",
            "npmVersion": "$(npm --version)"
          }
          EOF
          cat ../build-artifacts/build-metadata.json
      
      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ github.sha }}
          path: build-artifacts/build-metadata.json
          retention-days: 30
      
      - name: Comment PR with build info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get build size
            const { execSync } = require('child_process');
            const buildSize = execSync('du -sh frontend/.next', { encoding: 'utf8' }).split('\t')[0];
            
            const comment = `## 🏗️ Build Report
            
            ✅ Build completed successfully!
            
            **Build Details:**
            - Build ID: \`${process.env.BUILD_ID}\`
            - Commit: \`${context.sha.substring(0, 7)}\`
            - Total Size: **${buildSize}**
            
            **Artifacts:**
            - Build artifact uploaded and ready for deployment
            - Retention: 30 days
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
