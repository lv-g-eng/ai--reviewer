name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  # Build and test before deployment
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +%Y%m%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      
      - name: Build backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Backend build completed"
      
      - name: Build frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build:production
      
      - name: Create deployment package
        run: |
          mkdir -p deployment
          tar -czf deployment/backend-${{ steps.version.outputs.version }}.tar.gz backend/
          tar -czf deployment/frontend-${{ steps.version.outputs.version }}.tar.gz frontend/
      
      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deployment-package-${{ steps.version.outputs.version }}
          path: deployment/
          retention-days: 30

  # Deploy to staging automatically on main branch
  deploy-staging:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.ai-code-review.example.com
    steps:
      - uses: actions/checkout@v6
      
      - name: Download deployment package
        uses: actions/download-artifact@v8
        with:
          name: deployment-package-${{ needs.build.outputs.version }}
          path: deployment/
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to staging (Blue-Green)
        run: |
          echo "🚀 Starting blue-green deployment to staging..."
          
          # Get current active environment (blue or green)
          CURRENT_ENV=$(aws elbv2 describe-target-groups \
            --names staging-tg-active \
            --query 'TargetGroups[0].Tags[?Key==`Environment`].Value' \
            --output text)
          
          if [ "$CURRENT_ENV" == "blue" ]; then
            NEW_ENV="green"
          else
            NEW_ENV="blue"
          fi
          
          echo "Current environment: $CURRENT_ENV"
          echo "Deploying to: $NEW_ENV"
          
          # Deploy to new environment
          echo "Deploying backend to $NEW_ENV environment..."
          aws s3 cp deployment/backend-${{ needs.build.outputs.version }}.tar.gz \
            s3://ai-code-review-staging-deployments/backend-${{ needs.build.outputs.version }}.tar.gz
          
          echo "Deploying frontend to $NEW_ENV environment..."
          aws s3 cp deployment/frontend-${{ needs.build.outputs.version }}.tar.gz \
            s3://ai-code-review-staging-deployments/frontend-${{ needs.build.outputs.version }}.tar.gz
          
          # Update EC2 instances in new environment
          echo "Updating EC2 instances in $NEW_ENV environment..."
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Environment,Values=staging-$NEW_ENV" \
            --parameters 'commands=[
              "cd /opt/app",
              "aws s3 cp s3://ai-code-review-staging-deployments/backend-${{ needs.build.outputs.version }}.tar.gz .",
              "tar -xzf backend-${{ needs.build.outputs.version }}.tar.gz",
              "aws s3 cp s3://ai-code-review-staging-deployments/frontend-${{ needs.build.outputs.version }}.tar.gz .",
              "tar -xzf frontend-${{ needs.build.outputs.version }}.tar.gz",
              "sudo systemctl restart backend",
              "sudo systemctl restart frontend"
            ]'
          
          echo "✅ Deployment to $NEW_ENV environment completed"
      
      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests on staging..."
          
          # Wait for deployment to stabilize
          sleep 30
          
          # Health check
          HEALTH_URL="https://staging.ai-code-review.example.com/health"
          for i in {1..10}; do
            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed"
              break
            fi
            echo "Waiting for service to be healthy... ($i/10)"
            sleep 10
          done
          
          # Basic API tests
          echo "Testing authentication endpoint..."
          curl -f -s "https://staging.ai-code-review.example.com/api/auth/login" || exit 1
          
          echo "Testing projects endpoint..."
          curl -f -s "https://staging.ai-code-review.example.com/api/projects" || exit 1
          
          echo "✅ All smoke tests passed"
      
      - name: Switch traffic to new environment
        run: |
          echo "🔄 Switching traffic to new environment..."
          
          # Get current active environment
          CURRENT_ENV=$(aws elbv2 describe-target-groups \
            --names staging-tg-active \
            --query 'TargetGroups[0].Tags[?Key==`Environment`].Value' \
            --output text)
          
          if [ "$CURRENT_ENV" == "blue" ]; then
            NEW_ENV="green"
          else
            NEW_ENV="blue"
          fi
          
          # Update load balancer to point to new environment
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.STAGING_ALB_LISTENER_ARN }} \
            --default-actions Type=forward,TargetGroupArn=${{ secrets.STAGING_TG_ARN_PREFIX }}-$NEW_ENV
          
          # Tag the new active environment
          aws elbv2 add-tags \
            --resource-arns ${{ secrets.STAGING_TG_ARN_PREFIX }}-$NEW_ENV \
            --tags Key=Environment,Value=$NEW_ENV Key=Active,Value=true
          
          echo "✅ Traffic switched to $NEW_ENV environment"
      
      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Strategy**: Blue-Green" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://staging.ai-code-review.example.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All smoke tests passed. Staging environment is ready." >> $GITHUB_STEP_SUMMARY

  # Deploy to production with manual approval
  deploy-production:
    needs: [build, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai-code-review.example.com
    steps:
      - uses: actions/checkout@v6
      
      - name: Download deployment package
        uses: actions/download-artifact@v8
        with:
          name: deployment-package-${{ needs.build.outputs.version }}
          path: deployment/
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRODUCTION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRODUCTION }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Create backup of current production
        run: |
          echo "📦 Creating backup of current production..."
          BACKUP_VERSION="backup-$(date +%Y%m%d-%H%M%S)"
          
          # Backup current deployment
          aws s3 sync s3://ai-code-review-production-deployments/current/ \
            s3://ai-code-review-production-deployments/$BACKUP_VERSION/
          
          echo "✅ Backup created: $BACKUP_VERSION"
          echo "BACKUP_VERSION=$BACKUP_VERSION" >> $GITHUB_ENV
      
      - name: Deploy to production (Blue-Green)
        run: |
          echo "🚀 Starting blue-green deployment to production..."
          
          # Get current active environment (blue or green)
          CURRENT_ENV=$(aws elbv2 describe-target-groups \
            --names production-tg-active \
            --query 'TargetGroups[0].Tags[?Key==`Environment`].Value' \
            --output text)
          
          if [ "$CURRENT_ENV" == "blue" ]; then
            NEW_ENV="green"
          else
            NEW_ENV="blue"
          fi
          
          echo "Current environment: $CURRENT_ENV"
          echo "Deploying to: $NEW_ENV"
          echo "NEW_ENV=$NEW_ENV" >> $GITHUB_ENV
          echo "CURRENT_ENV=$CURRENT_ENV" >> $GITHUB_ENV
          
          # Deploy to new environment
          echo "Deploying backend to $NEW_ENV environment..."
          aws s3 cp deployment/backend-${{ needs.build.outputs.version }}.tar.gz \
            s3://ai-code-review-production-deployments/backend-${{ needs.build.outputs.version }}.tar.gz
          
          echo "Deploying frontend to $NEW_ENV environment..."
          aws s3 cp deployment/frontend-${{ needs.build.outputs.version }}.tar.gz \
            s3://ai-code-review-production-deployments/frontend-${{ needs.build.outputs.version }}.tar.gz
          
          # Update EC2 instances in new environment
          echo "Updating EC2 instances in $NEW_ENV environment..."
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Environment,Values=production-$NEW_ENV" \
            --parameters 'commands=[
              "cd /opt/app",
              "aws s3 cp s3://ai-code-review-production-deployments/backend-${{ needs.build.outputs.version }}.tar.gz .",
              "tar -xzf backend-${{ needs.build.outputs.version }}.tar.gz",
              "aws s3 cp s3://ai-code-review-production-deployments/frontend-${{ needs.build.outputs.version }}.tar.gz .",
              "tar -xzf frontend-${{ needs.build.outputs.version }}.tar.gz",
              "sudo systemctl restart backend",
              "sudo systemctl restart frontend"
            ]'
          
          echo "✅ Deployment to $NEW_ENV environment completed"
      
      - name: Run production smoke tests
        run: |
          echo "🧪 Running smoke tests on production..."
          
          # Wait for deployment to stabilize
          sleep 60
          
          # Health check
          HEALTH_URL="https://ai-code-review.example.com/health"
          for i in {1..15}; do
            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed"
              break
            fi
            echo "Waiting for service to be healthy... ($i/15)"
            sleep 10
          done
          
          # Basic API tests
          echo "Testing authentication endpoint..."
          curl -f -s "https://ai-code-review.example.com/api/auth/login" || exit 1
          
          echo "Testing projects endpoint..."
          curl -f -s "https://ai-code-review.example.com/api/projects" || exit 1
          
          # Performance test
          echo "Testing response time..."
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' "https://ai-code-review.example.com/api/health")
          echo "Response time: ${RESPONSE_TIME}s"
          
          echo "✅ All smoke tests passed"
      
      - name: Switch production traffic
        run: |
          echo "🔄 Switching production traffic to new environment..."
          
          # Update load balancer to point to new environment
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.PRODUCTION_ALB_LISTENER_ARN }} \
            --default-actions Type=forward,TargetGroupArn=${{ secrets.PRODUCTION_TG_ARN_PREFIX }}-$NEW_ENV
          
          # Tag the new active environment
          aws elbv2 add-tags \
            --resource-arns ${{ secrets.PRODUCTION_TG_ARN_PREFIX }}-$NEW_ENV \
            --tags Key=Environment,Value=$NEW_ENV Key=Active,Value=true
          
          echo "✅ Production traffic switched to $NEW_ENV environment"
      
      - name: Monitor deployment
        run: |
          echo "📊 Monitoring deployment for 5 minutes..."
          
          for i in {1..30}; do
            # Check error rate
            ERROR_RATE=$(aws cloudwatch get-metric-statistics \
              --namespace AWS/ApplicationELB \
              --metric-name HTTPCode_Target_5XX_Count \
              --dimensions Name=LoadBalancer,Value=${{ secrets.PRODUCTION_ALB_NAME }} \
              --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
              --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
              --period 300 \
              --statistics Sum \
              --query 'Datapoints[0].Sum' \
              --output text)
            
            echo "Error count in last 5 minutes: $ERROR_RATE"
            
            if [ "$ERROR_RATE" != "None" ] && [ "$ERROR_RATE" -gt 10 ]; then
              echo "❌ High error rate detected! Triggering rollback..."
              exit 1
            fi
            
            sleep 10
          done
          
          echo "✅ Deployment monitoring completed successfully"
      
      - name: Production deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Strategy**: Blue-Green" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://ai-code-review.example.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Backup**: ${{ env.BACKUP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production deployment completed successfully. Monitoring for issues." >> $GITHUB_STEP_SUMMARY
      
      - name: Notify deployment success
        if: success()
        run: |
          # Send notification to Slack/email
          echo "Sending deployment success notification..."
          # Add your notification logic here
