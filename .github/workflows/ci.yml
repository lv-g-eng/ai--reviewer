name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # Detect changes to optimize test execution
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # Backend linting checks (PEP 8)
  backend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install linting dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run Black formatter check
        run: |
          cd backend
          black --check app/ tests/
      
      - name: Run isort import check
        run: |
          cd backend
          isort --check-only app/ tests/
      
      - name: Run Flake8 linting
        run: |
          cd backend
          flake8 app/ tests/ --max-line-length=120 --extend-ignore=E203,W503

  # Frontend linting checks (ESLint)
  frontend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      
      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
      
      - name: Run TypeScript type check
        run: |
          cd frontend
          npm run type-check

  # Backend unit tests (run on every commit)
  backend-unit-tests:
    needs: [changes, backend-lint]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_code_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-json-report httpx sqlalchemy asyncpg redis
      
      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 2
          done
          echo "PostgreSQL is ready!"
          
          echo "Waiting for Redis..."
          until redis-cli -h localhost ping; do
            sleep 2
          done
          echo "Redis is ready!"
      
      - name: Run unit tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ai_code_review_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          TESTING: "true"
          JWT_SECRET: "test-secret-at-least-32-characters-long!!"
          PYTHONPATH: ${{ github.workspace }}/backend
          NEO4J_URI: ""
          NEO4J_USER: ""
          NEO4J_PASSWORD: ""
        run: |
          cd backend
          pytest tests/ -v \
            --ignore=tests/test_neo4j_fixtures.py \
            --ignore=tests/test_neo4j_client.py \
            --ignore=tests/test_neo4j_integration.py \
            -x --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --json-report --json-report-file=test-results.json
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-test-results
          path: |
            backend/test-results.json
            backend/coverage.xml

  # Frontend unit tests (run on every commit)
  frontend-unit-tests:
    needs: [changes, frontend-lint]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      
      - name: Run unit tests
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd frontend
          npm run test:ci
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-unit-test-results
          path: |
            frontend/junit.xml
            frontend/coverage/

  # Backend integration tests (run on pull requests only)
  backend-integration-tests:
    needs: [changes, backend-unit-tests]
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_code_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx sqlalchemy asyncpg redis
      
      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 2
          done
          
          echo "Waiting for Redis..."
          until redis-cli -h localhost ping; do
            sleep 2
          done
      
      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ai_code_review_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          TESTING: "true"
          JWT_SECRET: "test-secret-at-least-32-characters-long!!"
          PYTHONPATH: ${{ github.workspace }}/backend
          NEO4J_URI: ""
          NEO4J_USER: ""
          NEO4J_PASSWORD: ""
        run: |
          cd backend
          pytest tests/ -v \
            -m "integration or not unit" \
            --ignore=tests/test_neo4j_fixtures.py \
            --ignore=tests/test_neo4j_client.py \
            --ignore=tests/test_neo4j_integration.py \
            --tb=short \
            --cov=app \
            --cov-report=xml
      
      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-test-results
          path: backend/coverage.xml

  # Frontend integration tests (run on pull requests only)
  frontend-integration-tests:
    needs: [changes, frontend-unit-tests]
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      
      - name: Run integration tests
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd frontend
          npm run test:ci -- --testPathPattern="integration"
      
      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-integration-test-results
          path: frontend/coverage/
