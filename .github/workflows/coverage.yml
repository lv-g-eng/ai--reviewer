name: Code Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # Backend code coverage
  backend-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_code_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx sqlalchemy asyncpg redis
      
      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 2
          done
          
          echo "Waiting for Redis..."
          until redis-cli -h localhost ping; do
            sleep 2
          done
      
      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ai_code_review_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          TESTING: "true"
          JWT_SECRET: "test-secret-at-least-32-characters-long!!"
          PYTHONPATH: ${{ github.workspace }}/backend
          NEO4J_URI: ""
          NEO4J_USER: ""
          NEO4J_PASSWORD: ""
        run: |
          cd backend
          pytest tests/ \
            --ignore=tests/test_neo4j_fixtures.py \
            --ignore=tests/test_neo4j_client.py \
            --ignore=tests/test_neo4j_integration.py \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            --cov-fail-under=80
      
      - name: Check coverage threshold
        run: |
          cd backend
          coverage report --fail-under=80
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

  # Frontend code coverage
  frontend-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      
      - name: Run tests with coverage
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd frontend
          npm run test:coverage
      
      - name: Check coverage threshold
        run: |
          cd frontend
          node -e "
            const coverage = require('./coverage/coverage-summary.json');
            const total = coverage.total;
            const metrics = ['lines', 'statements', 'functions', 'branches'];
            let failed = false;
            
            console.log('\\n📊 Coverage Summary:\\n');
            metrics.forEach(metric => {
              const pct = total[metric].pct;
              const status = pct >= 80 ? '✅' : '❌';
              console.log(\`\${status} \${metric}: \${pct}%\`);
              if (pct < 80) failed = true;
            });
            
            if (failed) {
              console.error('\\n❌ Coverage threshold of 80% not met!');
              process.exit(1);
            } else {
              console.log('\\n✅ All coverage thresholds met!');
            }
          "
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: frontend
          threshold: 80
          annotations: all

  # Combined coverage report
  combined-coverage:
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-coverage]
    if: always()
    steps:
      - uses: actions/checkout@v6
      
      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage-report
          path: backend-coverage/
        continue-on-error: true
      
      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage-report
          path: frontend-coverage/
        continue-on-error: true
      
      - name: Generate coverage summary
        run: |
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Threshold: 80%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.backend-coverage.result }}" == "success" ]; then
            echo "✅ **Backend Coverage**: Passed (≥80%)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Backend Coverage**: Failed (<80%)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.frontend-coverage.result }}" == "success" ]; then
            echo "✅ **Frontend Coverage**: Passed (≥80%)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Frontend Coverage**: Failed (<80%)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Detailed coverage reports are available in the artifacts." >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if coverage below threshold
        if: needs.backend-coverage.result != 'success' || needs.frontend-coverage.result != 'success'
        run: |
          echo "❌ Code coverage is below the required 80% threshold"
          exit 1
