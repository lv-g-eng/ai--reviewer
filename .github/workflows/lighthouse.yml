name: Lighthouse CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
      
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results-${{ github.sha }}
          path: |
            frontend/.lighthouseci/
          retention-days: 30
      
      - name: Parse Lighthouse results
        if: always()
        run: |
          echo "## 🔦 Lighthouse Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Find the latest manifest file
          MANIFEST_FILE=$(find .lighthouseci -name "manifest.json" | head -n 1)
          
          if [ -f "$MANIFEST_FILE" ]; then
            # Extract scores from the first URL's results
            REPORT_FILE=$(jq -r '.[0].jsonPath' "$MANIFEST_FILE")
            
            if [ -f "$REPORT_FILE" ]; then
              PERF_SCORE=$(jq -r '.categories.performance.score * 100' "$REPORT_FILE")
              ACCESS_SCORE=$(jq -r '.categories.accessibility.score * 100' "$REPORT_FILE")
              BP_SCORE=$(jq -r '.categories["best-practices"].score * 100' "$REPORT_FILE")
              SEO_SCORE=$(jq -r '.categories.seo.score * 100' "$REPORT_FILE")
              
              FCP=$(jq -r '.audits["first-contentful-paint"].numericValue' "$REPORT_FILE")
              LCP=$(jq -r '.audits["largest-contentful-paint"].numericValue' "$REPORT_FILE")
              CLS=$(jq -r '.audits["cumulative-layout-shift"].numericValue' "$REPORT_FILE")
              TBT=$(jq -r '.audits["total-blocking-time"].numericValue' "$REPORT_FILE")
              SI=$(jq -r '.audits["speed-index"].numericValue' "$REPORT_FILE")
              
              echo "### Scores" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Category | Score | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
              echo "| 🚀 Performance | ${PERF_SCORE}% | $([ ${PERF_SCORE%.*} -ge 90 ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
              echo "| ♿ Accessibility | ${ACCESS_SCORE}% | $([ ${ACCESS_SCORE%.*} -ge 90 ] && echo '✅' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
              echo "| ✨ Best Practices | ${BP_SCORE}% | $([ ${BP_SCORE%.*} -ge 90 ] && echo '✅' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
              echo "| 🔍 SEO | ${SEO_SCORE}% | $([ ${SEO_SCORE%.*} -ge 90 ] && echo '✅' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              echo "### Core Web Vitals" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Value | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
              echo "| First Contentful Paint | ${FCP}ms | < 2000ms | $([ ${FCP%.*} -lt 2000 ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
              echo "| Largest Contentful Paint | ${LCP}ms | < 2500ms | $([ ${LCP%.*} -lt 2500 ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
              echo "| Cumulative Layout Shift | ${CLS} | < 0.1 | $(awk -v cls="$CLS" 'BEGIN {print (cls < 0.1) ? "✅" : "❌"}') |" >> $GITHUB_STEP_SUMMARY
              echo "| Total Blocking Time | ${TBT}ms | < 300ms | $([ ${TBT%.*} -lt 300 ] && echo '✅' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
              echo "| Speed Index | ${SI}ms | < 3000ms | $([ ${SI%.*} -lt 3000 ] && echo '✅' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              # Check if performance score meets threshold
              if [ ${PERF_SCORE%.*} -lt 90 ]; then
                echo "❌ Performance score ${PERF_SCORE}% is below the required 90% threshold"
                exit 1
              else
                echo "✅ Performance score ${PERF_SCORE}% meets the 90% threshold"
              fi
            else
              echo "⚠️ Could not find report file: $REPORT_FILE" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Could not find Lighthouse manifest file" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find manifest file
            const manifestPath = 'frontend/.lighthouseci/manifest.json';
            
            if (!fs.existsSync(manifestPath)) {
              console.log('Manifest file not found');
              return;
            }
            
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const reportPath = manifest[0].jsonPath;
            
            if (!fs.existsSync(reportPath)) {
              console.log('Report file not found');
              return;
            }
            
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            
            const perfScore = Math.round(report.categories.performance.score * 100);
            const accessScore = Math.round(report.categories.accessibility.score * 100);
            const bpScore = Math.round(report.categories['best-practices'].score * 100);
            const seoScore = Math.round(report.categories.seo.score * 100);
            
            const fcp = Math.round(report.audits['first-contentful-paint'].numericValue);
            const lcp = Math.round(report.audits['largest-contentful-paint'].numericValue);
            const cls = report.audits['cumulative-layout-shift'].numericValue.toFixed(3);
            const tbt = Math.round(report.audits['total-blocking-time'].numericValue);
            const si = Math.round(report.audits['speed-index'].numericValue);
            
            const comment = `## 🔦 Lighthouse Performance Report
            
            ### Scores
            
            | Category | Score | Status |
            |----------|-------|--------|
            | 🚀 Performance | ${perfScore}% | ${perfScore >= 90 ? '✅' : '❌'} |
            | ♿ Accessibility | ${accessScore}% | ${accessScore >= 90 ? '✅' : '⚠️'} |
            | ✨ Best Practices | ${bpScore}% | ${bpScore >= 90 ? '✅' : '⚠️'} |
            | 🔍 SEO | ${seoScore}% | ${seoScore >= 90 ? '✅' : '⚠️'} |
            
            ### Core Web Vitals
            
            | Metric | Value | Threshold | Status |
            |--------|-------|-----------|--------|
            | First Contentful Paint | ${fcp}ms | < 2000ms | ${fcp < 2000 ? '✅' : '❌'} |
            | Largest Contentful Paint | ${lcp}ms | < 2500ms | ${lcp < 2500 ? '✅' : '❌'} |
            | Cumulative Layout Shift | ${cls} | < 0.1 | ${cls < 0.1 ? '✅' : '❌'} |
            | Total Blocking Time | ${tbt}ms | < 300ms | ${tbt < 300 ? '✅' : '⚠️'} |
            | Speed Index | ${si}ms | < 3000ms | ${si < 3000 ? '✅' : '⚠️'} |
            
            **Performance Threshold:** ${perfScore >= 90 ? '✅ Passed' : '❌ Failed'} (90% minimum required)
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
