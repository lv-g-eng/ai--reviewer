name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    # Selective Testing Logic
    changes:
        runs-on: ubuntu-latest
        outputs:
            backend: ${{ steps.filter.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      backend:
                        - 'backend/**'
                      frontend:
                        - 'frontend/**'

    backend-tests:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 15
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: ai_code_review_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"
                  cache-dependency-path: backend/requirements.txt

            - name: Install dependencies
              run: |
                  cd backend
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx sqlalchemy asyncpg redis pytest-cov pytest-json-report

            - name: Wait for services
              run: |
                  echo "Waiting for PostgreSQL..."
                  until pg_isready -h localhost -p 5432 -U postgres; do
                    sleep 2
                  done
                  echo "PostgreSQL is ready!"

                  echo "Waiting for Redis..."
                  until redis-cli -h localhost ping; do
                    sleep 2
                  done
                  echo "Redis is ready!"

            - name: Run tests
              env:
                  POSTGRES_HOST: localhost
                  POSTGRES_PORT: 5432
                  POSTGRES_DB: ai_code_review_test
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: postgres
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  TESTING: "true"
                  JWT_SECRET: "test-secret-at-least-32-characters-long!!"
                  PYTHONPATH: ${{ github.workspace }}/backend
                  NEO4J_URI: ""
                  NEO4J_USER: ""
                  NEO4J_PASSWORD: ""
              run: |
                  cd backend
                  pytest tests/ -v --ignore=tests/test_neo4j_fixtures.py --ignore=tests/test_neo4j_client.py -x --tb=short

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: backend-test-results
                  path: |
                      backend/test-results.json
                      backend/coverage.xml

    frontend-tests:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: |
                  cd frontend
                  npm ci --legacy-peer-deps

            - name: Run tests
              env:
                  CI: true
                  NODE_OPTIONS: "--max-old-space-size=4096"
              run: |
                  cd frontend
                  npm run test:ci

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: frontend-test-results
                  path: |
                      frontend/junit.xml
                      frontend/coverage/

    container-security:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Run Trivy vulnerability scanner on backend
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "config"
                  scan-ref: "./backend"
                  format: "table"
                  exit-code: "0"
                  severity: "CRITICAL,HIGH"

            - name: Run Trivy vulnerability scanner on frontend
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "config"
                  scan-ref: "./frontend"
                  format: "table"
                  exit-code: "0"
                  severity: "CRITICAL,HIGH"

            - name: Run Trivy on Kubernetes manifests
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "config"
                  scan-ref: "./k8s"
                  format: "table"
                  exit-code: "0"
                  severity: "CRITICAL,HIGH,MEDIUM"

            - name: Run Trivy on docker-compose
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "config"
                  scan-ref: "."
                  format: "sarif"
                  output: "trivy-results.sarif"
              continue-on-error: true

            - name: Upload Trivy scan results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: "trivy-results.sarif"
              continue-on-error: true

    security-scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run Snyk to check for vulnerabilities
              uses: snyk/actions/python-3.10@master
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

            - name: Generate SBOM
              uses: anchore/sbom-action@v0
              with:
                  path: ./
                  artifact-name: sbom.json

    container-build:
        needs: [backend-tests, frontend-tests, container-security]
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Install Cosign
              uses: sigstore/cosign-installer@v3

            - name: Build and Push Docker Image
              run: |
                  echo "Building and signing image..."
                  # docker build -t my-app:latest .
                  # cosign sign --key <key> my-app:latest
