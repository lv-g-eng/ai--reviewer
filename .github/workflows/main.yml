name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    # Selective Testing Logic
    changes:
        runs-on: ubuntu-latest
        outputs:
            backend: ${{ steps.filter.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      backend:
                        - 'backend/**'
                      frontend:
                        - 'frontend/**'

    backend-tests:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: ai_code_review_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
            redis:
                image: redis:alpine
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  cd backend
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx sqlalchemy asyncpg redis

            - name: Run tests
              env:
                  POSTGRES_HOST: localhost
                  POSTGRES_PORT: 5432
                  POSTGRES_DB: ai_code_review_test
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: postgres
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  TESTING: "true"
                  JWT_SECRET: "test-secret-at-least-32-characters-long!!"
              run: |
                  cd backend
                  pytest tests/ -v

    frontend-tests:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: |
                  cd frontend
                  npm install --legacy-peer-deps

            - name: Run tests
              run: |
                  cd frontend
                  npm run test:ci

    security-scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Run Snyk to check for vulnerabilities
              uses: snyk/actions/python-3.10@master
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

            - name: Generate SBOM
              uses: anchore/sbom-action@v0
              with:
                  path: ./
                  artifact-name: sbom.json

    container-build:
        needs: [backend-tests, frontend-tests]
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - name: Install Cosign
              uses: sigstore/cosign-installer@v3

            - name: Build and Push Docker Image
              run: |
                  echo "Building and signing image..."
                  # docker build -t my-app:latest .
                  # cosign sign --key <key> my-app:latest
