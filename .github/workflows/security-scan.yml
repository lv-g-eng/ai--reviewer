name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety semgrep
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run security scan
      run: |
        python scripts/security_scan.py
        
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: security_reports/
        
    - name: Comment PR with security results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // 查找最新的安全报告
          const reportsDir = 'security_reports';
          if (fs.existsSync(reportsDir)) {
            const files = fs.readdirSync(reportsDir);
            const summaryFile = files.find(f => f.startsWith('security_summary_'));
            
            if (summaryFile) {
              const summaryPath = path.join(reportsDir, summaryFile);
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              
              const comment = `## 🔒 安全扫描结果
              
**总体统计:**
- 问题总数: ${summary.summary.total_issues}
- 高风险: ${summary.summary.high_severity}
- 中风险: ${summary.summary.medium_severity}
- 低风险: ${summary.summary.low_severity}

**扫描工具结果:**
${summary.scan_results.map(r => 
  `- **${r.tool}**: ${r.status} (${r.issues_found} 问题)`
).join('\n')}

**建议:**
${summary.recommendations.map(r => `- ${r}`).join('\n')}
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
          }
          
    - name: Fail on high severity issues
      run: |
        # 检查是否有高风险问题
        if [ -d "security_reports" ]; then
          SUMMARY_FILE=$(ls security_reports/security_summary_*.json | head -1)
          if [ -f "$SUMMARY_FILE" ]; then
            HIGH_SEVERITY=$(python -c "import json; data=json.load(open('$SUMMARY_FILE')); print(data['summary']['high_severity'])")
            if [ "$HIGH_SEVERITY" -gt 0 ]; then
              echo "❌ 发现 $HIGH_SEVERITY 个高风险安全问题，构建失败"
              exit 1
            fi
          fi
        fi