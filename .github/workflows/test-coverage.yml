name: Test Coverage & Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  code-duplication-check:
    name: 代码重复率检查
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Run code similarity scan
      run: |
        python scripts/code_similarity_scanner.py . --output clone_report.json
        
    - name: Check duplication threshold
      run: |
        python -c "
        import json
        with open('clone_report.json', 'r') as f:
            report = json.load(f)
        
        duplication_ratio = report['duplication_ratio']
        threshold = 0.15  # 15%
        
        print(f'📊 代码重复率: {duplication_ratio:.2%}')
        
        if duplication_ratio > threshold:
            print(f'❌ 代码重复率超过阈值 {threshold:.1%}，阻止合并')
            exit(1)
        else:
            print(f'✅ 代码重复率在可接受范围内 (<{threshold:.1%})')
        "
        
    - name: Upload duplication report
      uses: actions/upload-artifact@v3
      with:
        name: duplication-report
        path: clone_report.json

  backend-coverage:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: ai_code_review_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov
        
    - name: Run tests with coverage
      run: |
        cd backend
        python -m pytest --cov=app --cov-report=xml --cov-report=term-missing tests/
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        
    - name: Check coverage threshold
      run: |
        cd backend
        python -c "
        import json
        with open('coverage.json', 'r') as f:
            data = json.load(f)
        coverage = data['totals']['percent_covered']
        print(f'Coverage: {coverage}%')
        if coverage < 70:
            print('❌ Coverage below 70% threshold')
            exit(1)
        else:
            print('✅ Coverage meets threshold')
        "

  frontend-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run tests with coverage
      run: |
        cd frontend
        npm run test -- --coverage --watchAll=false
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        
    - name: Check coverage threshold
      run: |
        cd frontend
        if [ -f "coverage/coverage-summary.json" ]; then
          COVERAGE=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json')).total.lines.pct")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage below 70% threshold"
            exit 1
          else
            echo "✅ Coverage meets threshold"
          fi
        else
          echo "⚠️ Coverage report not found"
        fi

  coverage-report:
    runs-on: ubuntu-latest
    needs: [code-duplication-check, backend-coverage, frontend-coverage]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Generate coverage report
      run: |
        python scripts/improve_test_coverage.py --generate-templates
        
    - name: Upload test templates
      uses: actions/upload-artifact@v3
      with:
        name: test-templates
        path: test_templates/
        
    - name: Comment PR with coverage results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          let comment = '## 📊 测试覆盖率与质量报告\n\n';
          
          // 读取覆盖率报告
          if (fs.existsSync('test_coverage_report.json')) {
            const report = JSON.parse(fs.readFileSync('test_coverage_report.json', 'utf8'));
            
            comment += '**覆盖率统计:**\n';
            if (report.backend && !report.backend.error) {
              comment += `- 后端: ${report.backend.total_coverage}%\n`;
            }
            if (report.frontend && !report.frontend.error) {
              comment += `- 前端: ${report.frontend.total_coverage}%\n`;
            }
            
            if (report.recommendations && report.recommendations.length > 0) {
              comment += '\n**改进建议:**\n';
              report.recommendations.forEach(rec => {
                comment += `- ${rec}\n`;
              });
            }
          }
          
          // 读取重复率报告
          if (fs.existsSync('clone_report.json')) {
            const dupReport = JSON.parse(fs.readFileSync('clone_report.json', 'utf8'));
            const ratio = (dupReport.duplication_ratio * 100).toFixed(1);
            const status = dupReport.duplication_ratio <= 0.15 ? '✅' : '❌';
            
            comment += `\n**代码重复率:** ${status} ${ratio}% (阈值: 15%)\n`;
            
            if (dupReport.duplication_ratio > 0.15) {
              comment += '\n⚠️ **代码重复率超过阈值，请重构重复代码后重新提交**\n';
            }
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });