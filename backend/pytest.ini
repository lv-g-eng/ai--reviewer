[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-report=json:coverage.json
    --json-report
    --json-report-file=test-results.json
    --asyncio-mode=auto
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that require databases
    e2e: End-to-end tests that validate complete workflows in staging
    slow: Tests that take longer than 30 seconds
    neo4j: Tests that specifically test Neo4j functionality
    async: Tests that use async/await
    database: Tests that require database connections
    requires_docker: Tests that require Docker to be running
    property_test: Property-based tests
    feature: Feature-specific tests
    property: Tests with property parameters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
