# Docker Compose configuration for OWASP ZAP security scanning
# This file adds ZAP scanner to the existing stack for security testing

version: '3.8'

services:
  # OWASP ZAP Security Scanner
  zap:
    image: owasp/zap2docker-stable
    container_name: ai_review_zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=${ZAP_API_KEY}
    ports:
      - "8080:8080"  # ZAP API
      - "8090:8090"  # ZAP Web UI
    volumes:
      - ./zap_config.yaml:/zap/wrk/zap_config.yaml:ro
      - ./zap_reports:/zap/wrk/reports:rw
      - zap_data:/zap/data
    environment:
      - ZAP_API_KEY=${ZAP_API_KEY:-changeme}
    networks:
      - ai_review_network
    depends_on:
      - backend
    restart: "no"  # Run on-demand, not continuously
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

volumes:
  zap_data:
    driver: local

networks:
  ai_review_network:
    external: true
