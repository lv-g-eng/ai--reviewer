# Docker Compose for Development Environment
# 开发环境配置 - 支持热重载和实时代码同步

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai_review_postgres_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai_review_network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: ai_review_redis_dev
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai_review_network

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.19-community
    container_name: ai_review_neo4j_dev
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 128M
      NEO4J_server_memory_heap_max__size: 256M
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data_dev:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai_review_network

  # pgAdmin 4 - Database Management Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_review_pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_review_network

  # Backend Development with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai_review_backend_dev
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - '8000:8000'
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ai_review_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker Development
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai_review_celery_dev
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    depends_on:
      - backend
      - redis
      - postgres
      - neo4j
    networks:
      - ai_review_network
    command: celery -A app.celery_config worker --loglevel=debug --concurrency=2

  # Celery Beat Scheduler Development
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai_review_celery_beat_dev
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    depends_on:
      - redis
      - postgres
      - neo4j
    networks:
      - ai_review_network
    command: celery -A app.celery_config beat --loglevel=debug

  # Frontend Development with Hot Reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
        NEXT_PUBLIC_BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
    container_name: ai_review_frontend_dev
    environment:
      NODE_ENV: development
      # 容器内部使用 Docker 网络名称
      BACKEND_URL: http://backend:8000
      # 浏览器访问使用 localhost（通过端口映射）
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${SESSION_SECRET}
      # 启用快速刷新
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
    volumes:
      # 挂载源代码以支持热重载
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      # 使用命名卷存储 node_modules（避免本地覆盖）
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    networks:
      - ai_review_network

volumes:
  postgres_data_dev:
  redis_data_dev:
  neo4j_data_dev:
  pgadmin_data_dev:
  frontend_node_modules:
  frontend_next:

networks:
  ai_review_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-ai-review-dev
