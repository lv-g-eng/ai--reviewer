# ============================================================
# AI Code Review Platform — Docker Compose (生产环境)
# 用法: docker-compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ────────────────── 基础设施层 ──────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ai_review_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_code_review}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_code_review}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_review_network
    # 生产环境不暴露端口到宿主机，仅内部通信

  redis:
    image: redis:7-alpine
    container_name: ai_review_redis
    restart: always
    command: >
      redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_review_network

  neo4j:
    image: neo4j:5-community
    container_name: ai_review_neo4j
    restart: always
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512M"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ai_review_network

  # ────────────────── 应用层 ──────────────────

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai_review_backend
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-ai_code_review}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - ai_review_network
    # 生产环境不暴露端口，由 Nginx 反向代理

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    container_name: ai_review_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai_review_network

  # ────────────────── 反向代理 ──────────────────

  nginx:
    image: nginx:alpine
    container_name: ai_review_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # SSL 证书 (可选)
    depends_on:
      - frontend
      - backend
    networks:
      - ai_review_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  ai_review_network:
    driver: bridge
