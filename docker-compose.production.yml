version: '3.8'

# ============================================================================
# AI Code Review Platform - Production Docker Compose Configuration
# ============================================================================
# This configuration is optimized for production deployment with:
# - High availability and scalability
# - Resource limits and health checks
# - Proper logging and monitoring
# - Security best practices
# ============================================================================

services:
  # ============================================================================
  # DATABASE SERVICES
  # ============================================================================
  
  postgres:
    image: postgres:16-alpine
    container_name: ai_review_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-2GB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-6GB}
      POSTGRES_WORK_MEM: ${POSTGRES_WORK_MEM:-128MB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-200}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init_scripts:/docker-entrypoint-initdb.d:ro
      - postgres_backups:/backups
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=postgres,environment=production"

  redis:
    image: redis:7.2-alpine
    container_name: ai_review_redis_prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  neo4j:
    image: neo4j:5.15-community
    container_name: ai_review_neo4j_prod
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: ${NEO4J_dbms_memory_heap_initial_size:-2G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_dbms_memory_heap_max_size:-4G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_dbms_memory_pagecache_size:-2G}
      NEO4J_dbms_tx_log_rotation_retention__policy: 7 days
      NEO4J_dbms_checkpoint_interval_time: 15m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_backups:/backups
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # APPLICATION SERVICES
  # ============================================================================
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        PYTHON_VERSION: 3.11
    image: ai-review-backend:${VERSION:-latest}
    container_name: ai_review_backend_prod
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      WORKERS: ${WORKER_PROCESSES:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=backend,environment=production"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: ai-review-backend:${VERSION:-latest}
    command: celery -A app.celery_config worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
    env_file:
      - .env.production
    depends_on:
      - backend
      - redis
      - postgres
      - neo4j
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_config", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: ai-review-backend:${VERSION:-latest}
    command: celery -A app.celery_config beat --loglevel=info
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - ai_review_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NODE_VERSION: 20
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: ai-review-frontend:${VERSION:-latest}
    container_name: ai_review_frontend_prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_ENVIRONMENT: production
    depends_on:
      - backend
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # REVERSE PROXY & LOAD BALANCER
  # ============================================================================
  
  nginx:
    image: nginx:alpine
    container_name: ai_review_nginx_prod
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - ai_review_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  ai_review_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_backups:
    driver: local
  nginx_logs:
    driver: local
  nginx_cache:
    driver: local
