# ============================================================
# AI Code Review Platform — Docker Compose (开发环境)
# 用法: docker-compose up -d
# ============================================================

services:
  # ────────────────── 基础设施层 ──────────────────

  # PostgreSQL 主数据库
  postgres:
    image: postgres:16-alpine
    container_name: ai_review_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_code_review}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_code_review}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_review_network

  # Redis 缓存 & 速率限制
  redis:
    image: redis:7-alpine
    container_name: ai_review_redis
    restart: unless-stopped
    command: >
      redis-server --requirepass "${REDIS_PASSWORD:-}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_review_network

  # Neo4j 图数据库 (架构关系分析)
  neo4j:
    image: neo4j:5-community
    container_name: ai_review_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j123}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt 协议
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ai_review_network

  # ────────────────── 应用层 ──────────────────

  # FastAPI 后端
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: ai_review_backend
    restart: unless-stopped
    # 覆盖 Dockerfile.dev 的 --reload，节省内存 (watchfiles 文件监控很耗内存)
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    env_file:
      - .env
    environment:
      # 覆盖 .env 中的 localhost 为 Docker 服务名
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      ENVIRONMENT: development
      # Alembic 迁移使用此 URL
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-ai_code_review}
    ports:
      - "8000:8000"
    volumes:
      # 挂载源代码实现热重载
      - ./backend:/app
      - ./common:/app/common
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    networks:
      - ai_review_network

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ai_review_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_GITHUB_CLIENT_ID: ${NEXT_PUBLIC_GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      # 挂载源代码实现热重载
      - ./frontend:/app
      - /app/node_modules # 排除 node_modules，使用容器内版本
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai_review_network

# ────────────────── 数据卷 ──────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

# ────────────────── 网络 ──────────────────
networks:
  ai_review_network:
    driver: bridge
