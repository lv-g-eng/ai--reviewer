services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai_review_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ai_code_review
      # Performance optimization
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 64MB
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init_scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  # pgAdmin 4 - Database Management Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_review_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: postgres123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: ai_review_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.19-community
    container_name: ai_review_neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      # Memory optimization - reduced for limited RAM systems
      NEO4J_server_memory_heap_initial__size: 128M
      NEO4J_server_memory_heap_max__size: 256M
      NEO4J_server_memory_pagecache_size: 64M
    ports:
      - '7474:7474' # Browser interface
      - '7687:7687' # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # FastAPI Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_review_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/ai_code_review
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j123
      - JWT_SECRET=dev_jwt_secret_key_32_chars_minimum
      - SECRET_KEY=dev_secret_key_32_chars_minimum
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=ai_code_review
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - GITHUB_CLIENT_ID=
      - GITHUB_CLIENT_SECRET=
      - GITHUB_CALLBACK_URL=http://localhost:8000/api/v1/auth/github/callback
      - GITHUB_TOKEN=
      - GITHUB_WEBHOOK_SECRET=webhook_secret_dev
    ports:
      - '8000:8000'
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/app:/app/app:ro
    user: 'root'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ai_review_celery
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/ai_code_review
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j123
      - JWT_SECRET=dev_jwt_secret_key_32_chars_minimum
      - SECRET_KEY=dev_secret_key_32_chars_minimum
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=ai_code_review
    depends_on:
      - backend
      - redis
      - postgres
      - neo4j
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ai_review_celery_beat
    command: celery -A app.celery_config beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/ai_code_review
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j123
      - JWT_SECRET=dev_jwt_secret_key_32_chars_minimum
      - SECRET_KEY=dev_secret_key_32_chars_minimum
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=ai_code_review
    depends_on:
      - redis
      - postgres
      - neo4j
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://host.docker.internal:8000/api/v1
        NEXT_PUBLIC_BACKEND_URL: http://host.docker.internal:8000
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
    container_name: ai_review_frontend
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      # Server-side API routes use this to connect to backend (Docker network)
      BACKEND_URL: http://backend:8000
      # Client-side (browser) uses this to connect to backend
      NEXT_PUBLIC_API_URL: http://host.docker.internal:8000/api/v1
      NEXT_PUBLIC_BACKEND_URL: http://host.docker.internal:8000
      NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      # NextAuth configuration
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${SESSION_SECRET}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - ai_review_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ai_review_nginx
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ai_review_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  pgadmin_data:
    driver: local

networks:
  ai_review_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-ai-review
