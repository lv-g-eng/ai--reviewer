          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/github/projects/{project_id}/pulls:
    get:
      tags:
      - GitHub Integration
      summary: List Project Pulls
      description: 'List pull requests for a project


        - **state**: PR state (open, closed, all)'
      operationId: list_project_pulls_api_v1_github_projects__project_id__pulls_get
      security:
      - HTTPBearer: []
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      - name: state
        in: query
        required: false
        schema:
          type: string
          default: open
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/github/pulls/{pr_id}/files:
    get:
      tags:
      - GitHub Integration
      summary: Get Pr Files
      description: Get changed files in a pull request
      operationId: get_pr_files_api_v1_github_pulls__pr_id__files_get
      security:
      - HTTPBearer: []
      parameters:
      - name: pr_id
        in: path
        required: true
        schema:
          type: string
          title: Pr Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/code-review/webhook:
    post:
      tags:
      - Code Review
      summary: Code Review Webhook
      description: "GitHub webhook endpoint for pull request events.\n\nReceives GitHub\
        \ webhook events, validates signatures, extracts PR data,\nand queues analysis\
        \ tasks. Implements replay protection using delivery IDs.\n\nHeaders:\n  \
        \  X-Hub-Signature-256: HMAC SHA-256 signature for payload verification\n\
        \    X-GitHub-Delivery: Unique delivery ID for replay protection\n    X-GitHub-Event:\
        \ Event type (e.g., \"pull_request\")\n    \nReturns:\n    200 OK for ping/unsupported/duplicate\
        \ events\n    202 Accepted for queued analysis tasks\n    \nValidates Requirements:\
        \ 1.1"
      operationId: code_review_webhook_api_v1_code_review_webhook_post
      parameters:
      - name: X-Hub-Signature-256
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Hub-Signature-256
      - name: X-GitHub-Delivery
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Github-Delivery
      - name: X-GitHub-Event
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Github-Event
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analysis/projects/{project_id}/analyze:
    post:
      tags:
      - PR Analysis
      summary: Analyze Pull Request Endpoint
      description: "Queue a pull request for asynchronous analysis\n\nReturns immediately\
        \ with task ID for polling\n\nQuery Parameters:\n- pr_id: Pull request database\
        \ ID\n\nReturns:\n{\n    \"task_id\": \"abc123...\",\n    \"status\": \"PENDING\"\
        ,\n    \"pr_id\": \"...\",\n    \"message\": \"PR analysis queued and will\
        \ begin shortly\"\n}"
      operationId: analyze_pull_request_endpoint_api_v1_analysis_projects__project_id__analyze_post
      security:
      - HTTPBearer: []
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      - name: pr_id
        in: query
        required: true
        schema:
          type: string
          title: Pr Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analysis/analysis/{task_id}/status:
    get:
      tags:
      - PR Analysis
      summary: Get Analysis Status
      description: "Get the status of an analysis task\n\nReturns:\n{\n    \"task_id\"\
        : \"abc123...\",\n    \"status\": \"PENDING|PROGRESS|SUCCESS|FAILURE\",\n\
        \    \"result\": {...},\n    \"error\": null or error message\n}"
      operationId: get_analysis_status_api_v1_analysis_analysis__task_id__status_get
      security:
      - HTTPBearer: []
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analysis/projects/{project_id}/pull-requests/{pr_id}/reanalyze:
    post:
      tags:
      - PR Analysis
      summary: Reanalyze Pull Request
      description: 'Re-analyze an existing pull request


        Useful for retrying failed analyses or analyzing with updated rules


        Returns task info with task_id'
      operationId: reanalyze_pull_request_api_v1_analysis_projects__project_id__pull_requests__pr_id__reanalyze_post
      security:
      - HTTPBearer: []
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      - name: pr_id
        in: path
        required: true
        schema:
          type: string
          title: Pr Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analysis/projects/{project_id}/circular-dependencies:
    post:
      tags:
      - PR Analysis
      summary: Analyze Circular Dependencies
      description: "Analyze circular dependencies in a project using AST analysis\n\
        \nThis endpoint runs as a background task to prevent timeout issues in CI/CD\
        \ pipelines.\nThe analysis uses Python's AST library to build a dependency\
        \ graph and detect cycles.\n\nReturns:\n    Task initiation response with\
        \ estimated completion time\n\nBackground Task Results:\n    The analysis\
        \ results are logged and can be retrieved from application logs\n    or stored\
        \ in the database for future reference.\n\nExample Response:\n{\n    \"message\"\
        : \"Circular dependency analysis started\",\n    \"project_id\": \"project-123\"\
        ,\n    \"status\": \"running\",\n    \"estimated_duration\": \"30-60 seconds\"\
        \n}"
      operationId: analyze_circular_dependencies_api_v1_analysis_projects__project_id__circular_dependencies_post
      security:
      - HTTPBearer: []
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyze/analyze:
    post:
      tags:
      - Architecture Analysis
      summary: Analyze Repository
      description: Analyze a GitHub repository and return architectural information.
      operationId: analyze_repository_api_v1_analyze_analyze_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyze/analyze/{analysis_id}:
    get:
      tags:
      - Architecture Analysis
      summary: Get Analysis Result
      description: Get the result of a previously started analysis.
      operationId: get_analysis_result_api_v1_analyze_analyze__analysis_id__get
      parameters:
      - name: analysis_id
        in: path
        required: true
        schema:
          type: string
          title: Analysis Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/llm/analyze-code:
    post:
      tags:
      - Local LLM
      summary: Analyze Code
      description: 'Analyze code using local LLM


        Performs code review, security analysis, or performance analysis'
      operationId: analyze_code_api_v1_llm_analyze_code_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/llm/generate:
    post:
      tags:
      - Local LLM
      summary: Generate Text
      description: 'Generate text using local LLM


        General-purpose text generation endpoint'
      operationId: generate_text_api_v1_llm_generate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
