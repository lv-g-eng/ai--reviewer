openapi: 3.1.0
info:
  title: AI Code Review Platform
  description: "\n# AI-Based Code Review and Architecture Analysis Platform\n\nAn\
    \ intelligent web-based platform that automates code review and architectural\
    \ analysis using:\n- **AST Parsing**: Abstract Syntax Tree analysis for code structure\n\
    - **Neo4j Graph Database**: Dependency graphs and architectural relationships\n\
    - **LLM Integration**: GPT-4, Claude 3.5, and Ollama for intelligent analysis\n\
    - **GitHub Integration**: Automated PR reviews via webhooks\n\n## Features\n\n\
    - \U0001F50D **Automated Code Review**: AI-powered analysis of pull requests\n\
    - \U0001F3D7️ **Architecture Analysis**: Detect patterns, circular dependencies,\
    \ and drift\n- \U0001F4CA **Metrics & Visualization**: Interactive dependency\
    \ graphs and quality metrics\n- \U0001F510 **Enterprise Security**: RBAC, JWT\
    \ authentication, audit logging\n- \U0001F4C8 **Monitoring**: Prometheus metrics,\
    \ distributed tracing, health checks\n\n## Authentication\n\nMost endpoints require\
    \ JWT authentication. Include the token in the Authorization header:\n\n```\n\
    Authorization: Bearer <your_jwt_token>\n```\n\nGet your token by calling `/api/v1/auth/login`\
    \ or `/api/v1/rbac/auth/login`.\n\n## Rate Limiting\n\nAPI endpoints are rate-limited\
    \ to 100 requests per minute per user.\nExceeding this limit will result in HTTP\
    \ 429 responses.\n\n## Error Responses\n\nAll endpoints return standardized error\
    \ responses:\n\n```json\n{\n  \"detail\": \"Error message\",\n  \"error_code\"\
    : \"ERROR_CODE\",\n  \"timestamp\": \"2024-01-15T10:30:00Z\"\n}\n```\n\nCommon\
    \ HTTP status codes:\n- **400**: Bad Request - Invalid input\n- **401**: Unauthorized\
    \ - Missing or invalid authentication\n- **403**: Forbidden - Insufficient permissions\n\
    - **404**: Not Found - Resource doesn't exist\n- **429**: Too Many Requests -\
    \ Rate limit exceeded\n- **500**: Internal Server Error - Server-side error\n\
    - **503**: Service Unavailable - Service temporarily unavailable\n    "
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
paths:
  /api/v1/health/:
    get:
      tags:
      - Health
      summary: Health Check
      description: 'Overall health check endpoint.


        Returns 200 if healthy, 503 if degraded or unhealthy.

        Includes database connection status, version, and environment.


        Validates Requirements: 12.1, 12.2, 12.3, 12.4'
      operationId: health_check_api_v1_health__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Health Check Api V1 Health  Get
  /api/v1/health/ready:
    get:
      tags:
      - Health
      summary: Readiness Check
      description: 'Readiness probe endpoint (Kubernetes readiness probe).


        Returns 200 only if all required dependencies are ready:

        - PostgreSQL connected

        - Migrations applied


        Returns 503 if not ready.


        Validates Requirement: 12.5'
      operationId: readiness_check_api_v1_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Readiness Check Api V1 Health Ready Get
  /api/v1/health/live:
    get:
      tags:
      - Health
      summary: Liveness Check
      description: 'Liveness probe endpoint (Kubernetes liveness probe).


        Returns 200 if the application process is running.

        This is a simple check that doesn''t verify dependencies.


        Validates Requirement: 12.6'
      operationId: liveness_check_api_v1_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Liveness Check Api V1 Health Live Get
  /api/v1/health/detailed:
    get:
      tags:
      - Health
      summary: Detailed Health Check
      description: 'Detailed health check with component status.


        Deprecated: Use /health instead.'
      operationId: detailed_health_check_api_v1_health_detailed_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Detailed Health Check Api V1 Health Detailed Get
  /api/v1/database/test/postgres:
    get:
      tags:
      - Database
      summary: Test Postgres
      description: Test PostgreSQL connection
      operationId: test_postgres_api_v1_database_test_postgres_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/database/test/neo4j:
    get:
      tags:
      - Database
      summary: Test Neo4J
      description: Test Neo4j connection
      operationId: test_neo4j_api_v1_database_test_neo4j_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/database/test/redis:
    get:
      tags:
      - Database
      summary: Test Redis
      description: Test Redis connection
      operationId: test_redis_api_v1_database_test_redis_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/database/test/all:
    get:
      tags:
      - Database
      summary: Test All Databases
      description: Test all database connections
      operationId: test_all_databases_api_v1_database_test_all_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register
      description: 'Register a new user


        - **email**: Valid email address

        - **password**: Strong password (min 8 chars, uppercase, lowercase, digit,
        special char)

        - **full_name**: Optional full name'
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__auth__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: 'Login and get access/refresh tokens


        Rate limited: 5 attempts per minute per IP


        Security: Returns generic error message to prevent user enumeration (Requirement
        2.5)'
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      description: Logout and blacklist current token
      operationId: logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
      security:
      - HTTPBearer: []
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh Token
      description: 'Refresh access token using refresh token with token rotation


        Security Features:

        - Checks refresh token not revoked (Requirement 5.1)

        - Generates new token pair on refresh (Requirement 5.2)

        - Invalidates old refresh token (rotation) (Requirement 5.2)

        - Stores new refresh token metadata in Redis (Requirement 5.5)


        Token rotation ensures that each refresh token can only be used once,

        preventing token replay attacks and limiting the impact of token theft.'
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get Me
      description: Get current user information
      operationId: get_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__auth__UserResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/password:
    patch:
      tags:
      - Authentication
      summary: Change Password
      description: 'Change user password


        Requires current password for verification

        Security: Uses generic error messages to prevent information disclosure (Requirement
        2.5)'
      operationId: change_password_api_v1_auth_password_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/webhooks/github:
    post:
      tags:
      - Webhooks
      summary: Github Webhook Handler
      description: "GitHub webhook handler endpoint\n\nReceives GitHub webhook events,\
        \ validates signatures, and queues analysis tasks.\n\nSupported events:\n\
        - ping: Webhook configuration test\n- pull_request: PR opened, synchronized,\
        \ reopened, closed\n\nRequirements:\n    - 1.1: Receive webhooks within 10\
        \ seconds\n    - 1.5: Queue analysis tasks to Celery\n    \nReturns:\n   \
        \ 200: Webhook processed successfully\n    400: Invalid payload or missing\
        \ data\n    401: Invalid signature\n    404: Project not found\n    409: Webhook\
        \ already processed (replay)"
      operationId: github_webhook_handler_api_v1_webhooks_github_post
      parameters:
      - name: X-Hub-Signature-256
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Hub-Signature-256
      - name: X-GitHub-Delivery
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Github-Delivery
      - name: X-GitHub-Event
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Github-Event
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/github/webhook:
    post:
      tags:
      - GitHub Integration
      summary: Github Webhook
      description: 'Receive GitHub webhook events


        Handles pull_request events (opened, synchronize, closed, etc.)'
      operationId: github_webhook_api_v1_github_webhook_post
      parameters:
      - name: x-hub-signature-256
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Hub-Signature-256
      - name: x-github-delivery
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Github-Delivery
      - name: x-github-event
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Github-Event
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/github/pr/{pr_id}/analyze:
    post:
      tags:
      - GitHub Integration
      summary: Analyze Pull Request
      description: 'Manually trigger analysis of a pull request


        This endpoint can be used to manually trigger analysis of a pull request

        that has already been created.'
      operationId: analyze_pull_request_api_v1_github_pr__pr_id__analyze_post
      security:
      - HTTPBearer: []
      parameters:
      - name: pr_id
        in: path
        required: true
        schema:
          type: string
          title: Pr Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/github/pr/{pr_id}/review:
