# Prometheus Alerts Configuration
# AI Code Review Platform Monitoring Alerts

## Global Settings

global:
  evaluation_interval: 15s
  scrape_interval: 15s

## Alert Groups

groups:
  application:
    name: Application Alerts
    rules:
      - high_error_rate
      - high_latency
      - service_down
      - database_issues
      - redis_issues
      - memory_pressure
      - cpu_pressure
      - disk_space_low
  security:
    name: Security Alerts
    rules:
      - brute_force_attack
      - unauthorized_access
      - account_lockouts
      - suspicious_activity
  performance:
    name: Performance Alerts
    rules:
      - slow_database_queries
      - high_response_time
      - api_timeout
      - memory_leak
      - connection_pool_exhaustion

## Alert Rules

### Application Alerts

# High Error Rate
- alert: HighErrorRate
  expr: |
    sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
      /
    sum(rate(http_requests_total[5m])) by (job)
      > 0.05
  for: 10m
  labels:
    severity: critical
    category: application
  annotations:
    summary: "High error rate detected ({{ $value | humanize }}% errors)"
    description: "Error rate has exceeded 5% for the last 10 minutes"
    runbook_url: "/docs/operations-runbook#high-error-rate"

# High Latency
- alert: HighLatency
  expr: |
    histogram_quantile(0.95, http_request_duration_seconds) > 2
  for: 5m
  labels:
    severity: warning
    category: application
  annotations:
    summary: "High latency detected (95th percentile > 2s)"
    description: "95th percentile response time is {{ $value }} seconds"
    runbook_url: "/docs/operations-runbook#high-latency"

# Service Down
- alert: ServiceDown
  expr: up{job="ai-review-backend"} == 0
  for: 1m
  labels:
    severity: critical
    category: application
  annotations:
    summary: "Backend service is down"
    description: "Backend service has been down for more than 1 minute"
    runbook_url: "/docs/operations-runbook#service-down"

# Database Issues
- alert: DatabaseConnectionIssues
  expr: |
    pg_stat_activity_count{datname="ai_code_review"} < 1
  for: 5m
  labels:
    severity: critical
    category: application
  annotations:
    summary: "Database connection issues detected"
    description: "Database has less than 1 active connection for 5 minutes"
    runbook_url: "/docs/operations-runbook#database-issues"

# Redis Issues
- alert: RedisConnectionIssues
  expr: up{job="ai-review-redis"} == 0
  for: 2m
  labels:
    severity: critical
    category: application
  annotations:
    summary: "Redis is down"
    description: "Redis has been down for more than 2 minutes"
    runbook_url: "/docs/operations-runbook#redis-issues"

# Memory Pressure
- alert: MemoryPressure
  expr: |
    (container_memory_usage_bytes{name=~"backend|frontend"} / container_spec_memory_limit_bytes{name=~"backend|frontend"}) > 0.8
  for: 5m
  labels:
    severity: warning
    category: application
  annotations:
    summary: "High memory usage detected ({{ $value | humanizePercentage }})"
    description: "Container memory usage is above 80%"
    runbook_url: "/docs/operations-runbook#memory-pressure"

# CPU Pressure
- alert: CPUPressure
  expr: |
    (rate(container_cpu_usage_seconds{name=~"backend|frontend"}[5m]) * 100) > 80
  for: 5m
  labels:
    severity: warning
    category: application
  annotations:
    summary: "High CPU usage detected ({{ $value }}%)"
    description: "Average CPU usage is above 80% for 5 minutes"
    runbook_url: "/docs/operations-runbook#cpu-pressure"

# Disk Space Low
- alert: DiskSpaceLow
  expr: |
    (node_filesystem_avail_bytes{mountpoint="/var/lib/docker"} / node_filesystem_size_bytes{mountpoint="/var/lib/docker"}) < 0.2
  for: 10m
  labels:
    severity: critical
    category: application
  annotations:
    summary: "Disk space low ({{ $value | humanizePercentage }} remaining)"
    description: "Available disk space is less than 20%"
    runbook_url: "/docs/operations-runbook#disk-space-low"

### Security Alerts

# Brute Force Attack
- alert: BruteForceAttack
  expr: |
    sum(rate(http_requests_total{endpoint="/api/v1/auth/login",status=~"4.."}[1m])) by (endpoint) > 10
  for: 5m
  labels:
    severity: critical
    category: security
  annotations:
    summary: "Brute force attack detected on login endpoint"
    description: "More than 10 failed login attempts per minute for 5 minutes"
    runbook_url: "/docs/operations-runbook#brute-force-attack"

# Unauthorized Access
- alert: UnauthorizedAccess
  expr: |
    sum(rate(http_requests_total{status="401"}[1m])) by (endpoint) > 5
  for: 5m
  labels:
    severity: warning
    category: security
  annotations:
    summary: "High rate of unauthorized access ({{ $value }}/min)"
    description: "More than 5 unauthorized requests per minute for 5 minutes"
    runbook_url: "/docs/operations-runbook#unauthorized-access"

# Account Lockouts
- alert: HighAccountLockoutRate
  expr: |
    sum(rate(account_lockouts_total[1m])) by (user) > 1
  for: 5m
  labels:
    severity: warning
    category: security
  annotations:
    summary: "High account lockout rate detected"
    description: "More than 1 account locked per minute for 5 minutes"
    runbook_url: "/docs/operations-runbook#account-lockouts"

# Suspicious Activity
- alert: SuspiciousActivity
  expr: |
    sum(rate(http_requests_total{endpoint=~"/api/v1/admin/.*",status=~"2.."}[1m])) by (user) > 20
  for: 5m
  labels:
    severity: critical
    category: security
  annotations:
    summary: "Suspicious admin activity detected"
    description: "High rate of admin requests from same user"
    runbook_url: "/docs/operations-runbook#suspicious-activity"

### Performance Alerts

# Slow Database Queries
- alert: SlowDatabaseQueries
  expr: |
    pg_stat_statements_calls{datname="ai_code_review"} > 100 AND
    pg_stat_statements_mean_exec_time_ms{datname="ai_code_review"} > 500
  for: 10m
  labels:
    severity: warning
    category: performance
  annotations:
    summary: "Slow database queries detected"
    description: "Queries with mean execution time > 500ms detected"
    runbook_url: "/docs/operations-runbook#slow-database-queries"

# High Response Time
- alert: HighResponseTimeP99
  expr: |
    histogram_quantile(0.99, http_request_duration_seconds) > 5
  for: 5m
  labels:
    severity: warning
    category: performance
  annotations:
    summary: "Very high response time (99th percentile > 5s)"
    description: "99th percentile response time is {{ $value }} seconds"
    runbook_url: "/docs/operations-runbook#high-response-time"

# API Timeout
- alert: APITimeout
  expr: |
    sum(rate(http_requests_total{endpoint=~"/api/v1/.*",status=~"5.."}[5m])) by (endpoint) > 0.1
  for: 5m
  labels:
    severity: warning
    category: performance
  annotations:
    summary: "High API timeout rate ({{ $value }}% timeouts/min)"
    description: "API timeout rate is above 10% for 5 minutes"
    runbook_url: "/docs/operations-runbook#api-timeout"

# Memory Leak
- alert: MemoryLeak
  expr: |
    (container_memory_usage_bytes{name=~"backend|frontend"} / container_spec_memory_limit_bytes{name=~"backend|frontend"}) > 0.9
  for: 20m
  labels:
    severity: critical
    category: performance
  annotations:
    summary: "Possible memory leak detected ({{ $value | humanizePercentage }} memory usage)"
    description: "Container memory usage has been above 90% for 20 minutes"
    runbook_url: "/docs/operations-runbook#memory-leak"

# Connection Pool Exhaustion
- alert: ConnectionPoolExhaustion
  expr: |
    pg_stat_activity_count{datname="ai_code_review", state="active"} > 90
  for: 5m
  alerts: 95
  labels:
    severity: critical
    category: performance
  annotations:
    summary: "Database connection pool nearly exhausted ({{ $value }}/100 connections)"
    description: "More than 90% of database connections are in use"
    runbook_url: "/docs/operations-runbook#connection-pool-exhaustion"

## Slack Notifications

route:
  receiver: 'slack'
  matchers:
    - severity: critical
  continue: true
  group_wait: 5m
  repeat_interval: 30m

receivers:
  - name: 'slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK'
        channel: '#alerts-critical'
        title: '🚨 [{{ .Status | toUpper }}] {{ .Labels.alertname }}]'
        text: |
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Category:* {{ .Labels.category }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Graph:* http://prometheus.example.com/graph?g0.expr={{ .Labels.alertname }}
          *Runbook:* {{ .Annotations.runbook_url }}
        color: '{{ if eq .Labels.severity "critical" }}danger{{ else if eq .Labels.severity "warning" }}warning{{ else }}good'

## Email Notifications

route:
  receiver: 'email'
  matchers:
    - severity: critical
    - severity: warning
  continue: true
  group_wait: 5m
  repeat_interval: 1h

receivers:
  - name: 'email'
    email_configs:
      - to: 'ops-team@example.com'
        from: 'alerts@ai-review.com'
        smarthost: 'localhost'
        auth_username: 'alertmanager'
        auth_password: 'password'
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .Labels.alertname }}] - AI Review Platform'
          body: |
            Alert: {{ .Labels.alertname }}
            Severity: {{ .Labels.severity }}
            Category: {{ .Labels.category }}
            Summary: {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            Runbook: {{ .Annotations.runbook_url }}
            
            Query: {{ .Labels.alertname }}
            Labels: {{ .Labels }}
            
            Time: {{ .StartsAt }}
            URL: http://grafana.example.com/d/ai-review-platform

## Alertmanager Configuration

# Set external URL for links
global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK'

# Route configuration
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'slack'

# Silence configuration
# Use to silence specific alerts
silences:
  - matchers:
      - alertname: 'ServiceDown'
      - label: 'environment: 'development''
